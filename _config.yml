### Site Settings ###
title               : Isaac Nason | Mechatronics Engineer
description         : >-
                      Hardware and software engineer with 15 years of experience bridging the gap between physical mechanics and digital control systems. Specializing in Python, C#, and rapid mechatronic prototyping.
url                 : "https://isaacnason.net"
baseurl             : ""            # Change to empty quotes if you are hosting your site at <your-username>.github.io directly
repository          : mistabowhunta.github.io     # Change to <your-username>/<your-username>.github.io (or remove it if you don't need remote projects)
remote_theme        : yousinix/portfolYOU
open_new_tab        : false                    # Opens external URLs in new tab (works for posts, projects and navbar only)
permalink           : permalink: /blog/:title/


### Plugins ###
plugins:
  - jemoji


### Navbar Settings ###
nav_exclude:                                            # The following paths are excluded from navbar
  - pages/tags.html
  - pages/404.html
  - pages/index.md
  - documentation/partials/**                           # For Documentation Only


