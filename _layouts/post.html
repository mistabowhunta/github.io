---
layout: default
---
<div class="container mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-lg-10 col-md-12 content-themed">
      
      <header class="mb-4">
        <h1 class="post-title">{{ page.title }}</h1>
        <p class="text-muted">{{ page.date | date: "%B %d, %Y" }}</p>
      </header>

      <article>
        {{ content }}
      </article>

    </div>
  </div>
</div>
